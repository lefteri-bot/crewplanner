<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Schelle Crew Planner</title>
</head>
<body style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0b1020;color:#e9eefc">
  <div style="max-width:520px;padding:24px;border:1px solid rgba(255,255,255,0.12);border-radius:16px;background:rgba(255,255,255,0.06)">
    <h1 style="margin:0 0 10px 0;font-size:20px">Admin wordt geopend…</h1>
    <p style="margin:0 0 12px 0;line-height:1.4;opacity:0.9">
      Deze snelkoppeling zet enkel de <b>admin UI</b> open op PC. Je bent pas echt admin als je de juiste PIN/ADMIN_KEY invult.
    </p>
    <p style="margin:0;opacity:0.8;font-size:14px">
      Als je hier blijft hangen: klik <a href="/?admin=1" style="color:#9ad0ff">Open Admin</a>.
    </p>
  </div>
  <script>
    // Force admin UI on this device (PC). Does NOT grant admin rights.
    try { localStorage.setItem('sc_forceAdmin','1'); } catch(e) {}
    // Go to admin UI
    location.replace('/?admin=1');
  </script>
</body>
</html>
